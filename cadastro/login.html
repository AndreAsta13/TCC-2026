<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Login</title>

<link rel="stylesheet" href="../css/output.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

</head>

<body class="bg-gray-50 min-h-screen font-[Inter]">

<!-- FUNDO -->
<div class="fixed inset-0 -z-20 opacity-20
bg-[linear-gradient(to_right,#e5e7eb_1px,transparent_1px),
linear-gradient(to_bottom,#e5e7eb_1px,transparent_1px)]
bg-[size:40px_40px]"></div>

<div class="fixed inset-0 -z-10 overflow-hidden">
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-purple-400 rounded-full blur-3xl opacity-30"></div>
  <div class="absolute top-40 -right-40 w-96 h-96 bg-blue-400 rounded-full blur-3xl opacity-30"></div>
</div>

<!-- HEADER -->
<header class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
  <h1 class="text-2xl font-bold text-indigo-700">
    Transcreva.IA
  </h1>

  <a href="cadastro.html"
     class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">
     Cadastro
  </a>
</header>

<!-- CONTEÚDO -->
<main class="flex items-center justify-center px-4 py-10">

<div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-gray-100">

<h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
Login
</h2>

<form class="flex flex-col gap-4">

<input type="email"
placeholder="Email"
required
class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
/>

<input type="password"
placeholder="Senha"
required
class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
/>

<button type="submit"
class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold
hover:bg-indigo-700 transition shadow-md hover:shadow-lg">
Entrar
</button>

</form>

<p class="text-center text-sm text-gray-500 mt-4">
Não tem conta?
<a href="cadastro.html" class="text-indigo-600 hover:underline">
Cadastrar
</a>
</p>

</div>

</main>

</body>
</html>
