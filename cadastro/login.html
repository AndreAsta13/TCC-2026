<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login</title>

<link rel="stylesheet" href="../css/output.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 min-h-screen font-[Inter]">

<main class="flex items-center justify-center px-4 py-10">
<div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl">

<h2 class="text-2xl font-bold text-center mb-6">Login</h2>

<form id="formLogin" class="flex flex-col gap-4">

<input type="email" id="email" placeholder="Email" required class="px-4 py-3 border rounded-lg" />

<input type="password" id="senha" placeholder="Senha" required class="px-4 py-3 border rounded-lg" />

<button type="submit" class="bg-indigo-600 text-white py-3 rounded-lg">
Entrar
</button>

</form>

</div>
</main>

<script>
document.getElementById("formLogin").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  console.log("Tentando login...");

  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ email, senha }),
  });

  const data = await res.json();

  alert(data.sucesso ? "Login realizado!" : data.erro);
});
</script>

</body>
</html>
