<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cadastro</title>

<link rel="stylesheet" href="../css/output.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 min-h-screen font-[Inter]">

<!-- HEADER -->
<header class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">

  <h1 class="text-2xl font-bold text-indigo-700">
    Transcreva.IA
  </h1>

  <div class="flex items-center gap-4">

    <a href="../index.html"
       class="bg-indigo-200 text-indigo-800 px-5 py-2 rounded-lg hover:bg-indigo-300 transition">
       Início
    </a>

    <a href="login.html"
       class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">
       Login
    </a>

  </div>

</header>

<!-- CONTEÚDO -->
<main class="flex items-center justify-center px-4 py-10">

<div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl">

<h2 class="text-2xl font-bold text-center mb-6">Cadastro</h2>

<form id="formCadastro" class="flex flex-col gap-4">

<input type="text" id="nome" placeholder="Nome" required class="px-4 py-3 border rounded-lg" />

<input type="email" id="email" placeholder="Email" required class="px-4 py-3 border rounded-lg" />

<input type="password" id="senha" placeholder="Senha" required class="px-4 py-3 border rounded-lg" />

<button type="submit" class="bg-indigo-600 text-white py-3 rounded-lg">
Cadastrar
</button>

</form>

</div>
</main>

<script>
document.getElementById("formCadastro").addEventListener("submit", async (e) => {
  e.preventDefault();

  const nome = document.getElementById("nome").value;
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const res = await fetch("http://localhost:3000/cadastro", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ nome, email, senha }),
  });

  const data = await res.json();

  alert(data.sucesso ? "Cadastro realizado!" : data.erro);
});
</script>

</body>
</html>
